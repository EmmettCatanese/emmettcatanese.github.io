<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: #f7f7f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.6;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(251, 251, 253, 0);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      z-index: 1000;
      padding: 1rem 0;
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1d1d1f;
      text-decoration: none;
      background: linear-gradient(135deg, #1d1d1f 0%, #ff00a2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: all 0.3s ease;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 2rem;
      transition: all 0.3s ease;
    }

    .nav-links a {
      text-decoration: none;
      color: #1d1d1f;
      font-weight: 400;
      transition: color 0.3s ease;
      position: relative;
    }

    .nav-links a:hover {
      color: #ff00a2;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -5px;
      left: 50%;
      background: #ff00a2;
      transition: all 0.3s ease;
      transform: translateX(-50%);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
    }

    .container {
        position: relative;
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .cat-photo {
        position: absolute;
        width: 85vh;
        height: 100vh;
        object-fit: cover;
        object-position: center top;
        border-radius: 0;
        flex-shrink: 0;
        z-index: 1;
    }

    .cat-photo.left  { left: -2vw; }
    .cat-photo.right { right: -10vw; }

    .headline {
      flex: 1;
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      font-weight: 600;
      line-height: 1.6;
      color: #000000;
      text-align: center;
      padding: 2rem;
        z-index: 2;
        position: relative;
    }

    .num {
      display: inline-block;
      position: relative;
      color: #ff00a2;
      padding: 0 4px;
    }

    .num svg {
      position: absolute;
      top: -5px;
      left: -5px;
      width: calc(100% + 10px);
      height: calc(100% + 10px);
      overflow: visible;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      body { overflow: auto; }
      .container { flex-direction: column; height: auto; }
      .cat-photo { width: 100%; height: 220px; }
    }
  </style>
</head>
<body>
  <nav id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Emmett Catanese</a>
      <ul class="nav-links">
        <li><a href="index.html#home">Home</a></li>
        <li><a href="index.html#projects">Projects</a></li>
        <li><a href="index.html#tools">Tools</a></li>
        <li><a href="index.html#about">About</a></li>
      </ul>
    </div>
  </nav>
  <main class="container">
    <img class="cat-photo left" src="Images/MapleComputer.png" alt="Maple" />

    <p class="headline">
      Maple and Wybie looked far and wide<br>
      (and ate over
      <span class="num">404
        <svg viewBox="0 0 52 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="26" cy="16" rx="24" ry="13" stroke="#ff00a2" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      treats)<br>
      but couldn't find the page<br>you were looking for.
    </p>

    <img class="cat-photo right" src="Images/WybieComputer.png" alt="Wybie" />
  </main>
</body>
</html>
